<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/pandasuite-bridge/lib/pandasuite-bridge.min.js"></script>

<style>
body{
margin:0;
background:black;
text-align:center;
font-family:Arial;
color:white
}

button{
margin-top:40vh;
padding:20px 40px;
font-size:20px;
border:none;
border-radius:10px;
background:#00FF88;
color:black
}
</style>
</head>

<body>

<input
id="cameraInput"
type="file"
accept="image/*"
capture
style="display:none"
/>

<button id="btn">Prendre photo</button>

<script>

const input = document.getElementById("cameraInput");
const button = document.getElementById("btn");


// déclenche caméra comme scanner déclenche lecture
button.addEventListener("click", () => {

input.click();

});


// quand photo prise
input.addEventListener("change", (event) => {

const file = event.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

// EXACTEMENT comme ton scanner ZXing
if(window.PandaBridge){

PandaBridge.send({
image: e.target.result,
timestamp: Date.now()
});

}

};

reader.readAsDataURL(file);

});

</script>

</body>
</html>
