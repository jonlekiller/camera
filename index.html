<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/pandasuite-bridge/lib/pandasuite-bridge.min.js"></script>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center
}

video{
width:100vw;
height:100vh;
object-fit:cover
}

button{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#00FF88;
color:black
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>

<button id="captureBtn">Initialisation caméra...</button>

<canvas id="canvas" style="display:none"></canvas>

<script>

const video = document.getElementById("video");
const button = document.getElementById("captureBtn");

let streamReady = false;


// démarrage caméra (compatible Android WebView)
async function startCamera(){

try{

const stream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:false
});

video.srcObject = stream;

// attendre que la vidéo soit réellement prête
video.addEventListener("loadeddata", () => {

streamReady = true;

button.innerText = "Prendre photo";

});

}catch(err){

alert("Erreur accès caméra : " + err.message);

}

}

startCamera();


// capture image
button.onclick = function(){

if(!streamReady){

alert("Caméra pas encore prête");

return;

}

const canvas = document.getElementById("canvas");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

canvas.getContext("2d").drawImage(video,0,0);

const image = canvas.toDataURL("image/jpeg",0.9);


// envoyer à PandaSuite
if(window.PandaBridge){

PandaBridge.send("capture",{
image:image,
timestamp:Date.now()
});

}

};

</script>

</body>
</html>
