<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Camera PandaSuite</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  text-align: center;
  background: #111;
  color: white;
}

video {
  width: 100%;
  height: auto;
}

button {
  margin-top: 20px;
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  background: #2196f3;
  color: white;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>📸 Prendre une photo</h2>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="capturePhoto()">Prendre photo</button>

<canvas id="canvas" style="display:none"></canvas>

<script>

// démarrer caméra arrière
async function startCamera() {

  try {

    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" }
      },
      audio: false
    });

    document.getElementById("video").srcObject = stream;

  } catch (error) {

    alert("Impossible d'accéder à la caméra : " + error);

  }
}

startCamera();


// capture photo
function capturePhoto() {

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  const base64Image = canvas.toDataURL("image/jpeg", 0.9);

  sendToPandaSuite(base64Image);
}


// envoyer image à PandaSuite
function sendToPandaSuite(imageData) {

  const payload = {
    type: "cameraImage",
    image: imageData,
    timestamp: Date.now()
  };

  // compatibilité maximale WebView PandaSuite
  if (window.top) {
    window.top.postMessage(payload, "*");
  }

  if (window.parent) {
    window.parent.postMessage(payload, "*");
  }

}

</script>

</body>
</html>
