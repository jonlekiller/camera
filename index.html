<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/pandasuite-bridge/lib/pandasuite-bridge.min.js"></script>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center
}

video{
width:100vw;
height:100vh;
object-fit:cover
}

button{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#00FF88;
color:black
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<button id="captureBtn" disabled>Chargement caméra...</button>

<canvas id="canvas" style="display:none"></canvas>

<script>

const video = document.getElementById("video");
const button = document.getElementById("captureBtn");

async function startCamera(){

try{

const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:{ideal:"environment"}},
audio:false
});

video.srcObject = stream;

/* attendre que la caméra soit prête */

video.onloadedmetadata = () => {

button.disabled = false;
button.innerText = "Prendre photo";

};

}catch(e){

alert("Erreur caméra : " + e);

}

}

startCamera();


button.onclick = function(){

if(video.videoWidth === 0){
alert("Caméra pas prête");
return;
}

const canvas = document.getElementById("canvas");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

canvas.getContext("2d").drawImage(video,0,0);

const image = canvas.toDataURL("image/jpeg",0.9);

if(window.PandaBridge){

PandaBridge.send("capture",{
image:image,
timestamp:Date.now()
});

}

};

</script>

</body>
</html>
