<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/pandasuite-bridge/lib/pandasuite-bridge.min.js"></script>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center
}

button{
margin-top:40vh;
padding:20px 40px;
font-size:20px;
border:none;
border-radius:10px;
background:#00FF88;
color:black
}
</style>
</head>

<body>

<input
id="cameraInput"
type="file"
accept="image/*"
capture="environment"
style="display:none"
/>

<button onclick="openCamera()">Prendre photo</button>

<script>

function openCamera(){

document.getElementById("cameraInput").click();

}

document.getElementById("cameraInput").addEventListener("change", function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(evt){

if(window.PandaBridge){

PandaBridge.send("capture",{
image: evt.target.result,
timestamp: Date.now()
});

}

};

reader.readAsDataURL(file);

});

</script>

</body>
</html>
