<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/pandasuite-bridge/lib/pandasuite-bridge.min.js"></script>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: sans-serif;
  text-align: center;
}

video {
  width: 100%;
}

button {
  margin-top: 20px;
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 8px;
  border: none;
  background: #2196f3;
  color: white;
}
</style>
</head>

<body>

<h2>📸 Caméra</h2>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="capture()">Prendre photo</button>

<canvas id="canvas" style="display:none"></canvas>

<script>

async function startCamera() {

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" } },
    audio: false
  });

  document.getElementById("video").srcObject = stream;
}

startCamera();


function capture() {

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");

  ctx.drawImage(video, 0, 0);

  const base64 = canvas.toDataURL("image/jpeg", 0.9);

  PandaBridge.setData("image", base64);
  PandaBridge.setData("timestamp", Date.now());

  PandaBridge.send("cameraImage");
}

</script>

</body>
</html>
