<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/pandasuite-bridge/lib/pandasuite-bridge.min.js"></script>

<style>
body{
margin:0;
background:black;
text-align:center;
}

video{
width:100vw;
height:80vh;
object-fit:cover;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:8px;
background:#00FF88;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<br>

<button id="btn">Prendre photo</button>

<canvas id="canvas" style="display:none"></canvas>

<script>

const video = document.getElementById("video");
const button = document.getElementById("btn");

let ready = false;


// démarrer caméra (exactement comme ZXing)
async function startCamera(){

const devices = await navigator.mediaDevices.enumerateDevices();

const cameras = devices.filter(d => d.kind === "videoinput");

const cam = cameras[0]; // simple et fiable

const stream = await navigator.mediaDevices.getUserMedia({
video:{ deviceId:{ exact: cam.deviceId }},
audio:false
});

video.srcObject = stream;

video.onloadeddata = () => {
ready = true;
};

}

startCamera();


// capture photo
button.onclick = function(){

if(!ready){
alert("Caméra pas prête");
return;
}

const canvas = document.getElementById("canvas");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

canvas.getContext("2d").drawImage(video,0,0);

const image = canvas.toDataURL("image/jpeg",0.9);


// envoyer à PandaSuite (identique au scanner)

if(window.PandaBridge){

PandaBridge.send("capture",{
image:image,
timestamp:Date.now()
});

}

};

</script>

</body>
</html>
