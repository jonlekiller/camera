<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/pandasuite-bridge/lib/pandasuite-bridge.min.js"></script>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center
}

video{
width:100vw;
height:100vh;
object-fit:cover
}

button{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#00FF88;
color:black
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<button onclick="capture()">Prendre photo</button>

<canvas id="canvas" style="display:none"></canvas>

<script>

const video = document.getElementById("video");

let stream = null;


// sélectionner caméra arrière comme ZXing
async function startCamera(){

const devices = await navigator.mediaDevices.enumerateDevices();

const cameras = devices.filter(d => d.kind === "videoinput");

let backCamera = cameras.find(d =>
d.label.toLowerCase().includes("back")
||
d.label.toLowerCase().includes("rear")
);

if(!backCamera){
backCamera = cameras[0];
}

stream = await navigator.mediaDevices.getUserMedia({
video:{
deviceId:{ exact: backCamera.deviceId }
},
audio:false
});

video.srcObject = stream;

}

startCamera();


// capture image fiable
function capture(){

if(!video.videoWidth){

alert("Vidéo pas encore prête");

return;

}

const canvas = document.getElementById("canvas");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

canvas.getContext("2d").drawImage(video,0,0);

const image = canvas.toDataURL("image/jpeg",0.9);


// envoyer à PandaSuite (comme ton scanner)

if(window.PandaBridge){

PandaBridge.send("capture",{
image:image,
timestamp:Date.now()
});

}

}

</script>

</body>
</html>
